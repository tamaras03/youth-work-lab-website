<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Youth Work Lab</title>
    <style>
        /* CSS Variables for the Logo Color Palette */
        :root {
            --primary-blue: #425682;
            --accent-orange: #F26B26;
            --bright-cyan: #008BF8;
            --warm-yellow: #FFC024;
            --bg-light: #F8F9FA;
            --text-dark: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header & Sticky Navigation */
        header {
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 60px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-orange);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(to right, var(--primary-blue), var(--bright-cyan));
            color: white;
            text-align: center;
            padding: 5rem 2rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Content Layout */
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .gallery-section {
            margin-bottom: 4rem;
        }

        h2 {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--warm-yellow);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* Photo Grid Styling */
        .photo-grid {
            display: grid;
            /* Automatically fits as many 300px columns as possible */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
            /* Forces a nice, consistent rectangle shape for all photos */
            aspect-ratio: 4 / 3; 
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images fill the box without squishing */
            transition: transform 0.4s ease;
        }

        .photo-card:hover img {
            transform: scale(1.08); /* Smooth zoom effect on hover */
        }

        /* Footer */
        footer {
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 2.5rem;
            margin-top: 5rem;
        }

        @media (max-width: 768px) {
            nav { display: none; }
            .hero h1 { font-size: 2.5rem; }
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="images/IMG_8365.PNG" alt="Youth Work Lab Logo" class="logo-img">
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="activities.html">Activities</a>
            <a href="outcomes.html">Outcomes</a>
            <a href="gallery.html">Gallery</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Project Gallery</h1>
        <p>Moments and memories from Tetovo</p>
    </section>

    <div class="container">
        
        <div class="gallery-section">
            <h2>Workshops & Activities</h2>
            <div class="photo-grid">
                <div class="photo-card">
                    <img src="images/workshop.jpeg" alt="Participants mapping digital footprint">
                </div>
                <div class="photo-card">
                    <img src="images/blind4.jpeg" alt="Blindfold Trust Walk exercise">
                </div>
                <div class="photo-card">
                    <img src="images/namegame.jpeg" alt="Team target ball competition">
                </div>
            </div>
        </div>

        <div class="gallery-section">
            <h2>Study Visit: CED Tearce</h2>
            <div class="photo-grid">
                <div class="photo-card">
                    <img src="images/ced1.jpeg" alt="CED Visit Highlights">
                </div>
                <div class="photo-card">
                    <img src="images/ced2.jpeg" alt="Meeting local volunteers">
                </div>
                <div class="photo-card">
                    <img src="images/ced3.jpeg" alt="Organization mission briefing">
                </div>
            </div>
        </div>

        <div class="gallery-section">
            <h2>Intercultural Evenings</h2>
            <div class="photo-grid">
                <div class="photo-card">
                    <img src="images/ceska.jpeg" alt="Cultural performance">
                </div>
                <div class="photo-card">
                    <img src="images/interkultural.jpeg" alt="Traditional costumes and games">
                </div>
                <div class="photo-card">
                    <img src="images/serbian.jpeg" alt="Traditional dancing">
                </div>
            </div>
        </div>

    </div>

    <footer>
        <p><strong>YOUTH WORK LAB</strong> | Erasmus+ Training Course 2026</p>
        <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 10px;">Co-funded by the European Union</p>
    </footer>

</body>
</html>
